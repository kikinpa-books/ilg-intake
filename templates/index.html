<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ILG Client Intake</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      padding: 32px 16px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 32px;
    }

    header .logo-box {
      background: #003087;
      color: white;
      font-weight: 800;
      font-size: 22px;
      letter-spacing: 2px;
      padding: 10px 16px;
      border-radius: 4px;
    }

    header h1 {
      font-size: 20px;
      font-weight: 600;
      color: #003087;
    }

    header p {
      font-size: 13px;
      color: #666;
      margin-top: 2px;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .card-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #003087;
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid #e8edf5;
    }

    .field-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
    }

    .field-row .field { flex: 1; }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    label .required { color: #c0392b; margin-left: 2px; }

    input[type="text"],
    input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d7e2;
      border-radius: 6px;
      font-size: 14px;
      color: #1a1a2e;
      background: #fafbfc;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    input:focus {
      border-color: #003087;
      box-shadow: 0 0 0 3px rgba(0,48,135,0.1);
      background: white;
    }

    input.error { border-color: #c0392b; }

    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      cursor: pointer;
      user-select: none;
    }

    .toggle-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #003087;
      cursor: pointer;
    }

    .toggle-row span {
      font-size: 14px;
      font-weight: 500;
    }

    .collapsible { display: none; }
    .collapsible.visible { display: block; }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #003087;
      color: white;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: background 0.15s;
    }

    .submit-btn:hover { background: #002060; }
    .submit-btn:active { background: #001540; }
    .submit-btn:disabled { background: #7a95c2; cursor: not-allowed; }

    .error-msg {
      display: none;
      background: #fdf0ed;
      border: 1px solid #f5c6bb;
      color: #c0392b;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .hint {
      font-size: 11px;
      color: #888;
      margin-top: 4px;
    }
  </style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo-box">ILG</div>
    <div>
      <h1>Client Intake Form</h1>
      <p>Insurance Litigation Group, P.A. &amp; The Professional Law Group, PLLC</p>
    </div>
  </header>

  <div id="errorBanner" class="error-msg"></div>

  <form id="intakeForm" action="/generate" method="POST">

    <!-- CLIENT INFO -->
    <div class="card">
      <div class="card-title">Client Information</div>

      <div class="field">
        <label>Client 1 Full Name <span class="required">*</span></label>
        <input type="text" name="client1_name" placeholder="e.g. Jane Doe" autocomplete="name" required>
      </div>

      <label class="toggle-row" for="hasClient2Toggle">
        <input type="checkbox" id="hasClient2Toggle">
        <span>Add a second client / co-insured</span>
      </label>

      <div id="client2Section" class="collapsible">
        <div class="field">
          <label>Client 2 Full Name</label>
          <input type="text" name="client2_name" id="client2_name" placeholder="e.g. John Doe">
        </div>
      </div>
    </div>

    <!-- PROPERTY & LOSS -->
    <div class="card">
      <div class="card-title">Property &amp; Loss</div>

      <div class="field">
        <label>Property Address <span class="required">*</span></label>
        <input type="text" name="property_address" placeholder="e.g. 123 Main St, Miami, FL 33101" required>
      </div>

      <div class="field">
        <label>Date of Loss <span class="required">*</span></label>
        <input type="date" name="date_of_loss" required>
        <p class="hint">Enter the date the incident or damage occurred.</p>
      </div>
    </div>

    <!-- INSURANCE -->
    <div class="card">
      <div class="card-title">Insurance</div>

      <div class="field-row">
        <div class="field">
          <label>Insurance Company <span class="required">*</span></label>
          <input type="text" name="insurance_company" placeholder="e.g. Citizens Property Insurance" required>
        </div>
        <div class="field">
          <label>Policy Number <span class="required">*</span></label>
          <input type="text" name="policy_number" placeholder="e.g. CPZ1234567" required>
        </div>
      </div>
    </div>

    <!-- MORTGAGE -->
    <div class="card">
      <div class="card-title">Mortgage</div>

      <label class="toggle-row" for="hasMortgageToggle">
        <input type="checkbox" id="hasMortgageToggle" name="has_mortgage">
        <span>Property has a mortgage</span>
      </label>

      <div id="mortgageSection" class="collapsible">
        <div class="field-row">
          <div class="field">
            <label>Mortgage Company</label>
            <input type="text" name="mortgage_company" placeholder="e.g. Wells Fargo">
          </div>
          <div class="field">
            <label>Loan Number</label>
            <input type="text" name="loan_number" placeholder="e.g. WF-9876543">
          </div>
        </div>

        <div class="field">
          <label>Co-Borrower Name</label>
          <input type="text" name="coborrower_name" placeholder="Leave blank if none">
          <p class="hint">Only if different from Client 2 above.</p>
        </div>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submitBtn">Generate &amp; Download PDF &rarr;</button>

  </form>
</div>

<script>
  document.getElementById("hasClient2Toggle").addEventListener("change", function () {
    document.getElementById("client2Section").classList.toggle("visible", this.checked);
    if (!this.checked) document.getElementById("client2_name").value = "";
  });

  document.getElementById("hasMortgageToggle").addEventListener("change", function () {
    document.getElementById("mortgageSection").classList.toggle("visible", this.checked);
  });

  document.getElementById("intakeForm").addEventListener("submit", function () {
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Generating PDF…";
    setTimeout(() => {
      btn.disabled = false;
      btn.textContent = "Generate & Download PDF →";
    }, 5000);
  });
</script>
</body>
</html>
